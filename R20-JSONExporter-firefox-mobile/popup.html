<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>R20-JSONExporter</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
      }

      main {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 320px;
        padding: 8px;
      }

      #statusPanel {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 8px;
        border: 1px solid #d7d7d7;
        border-radius: 10px;
        background: #ffffff;
      }

      button {
        width: 100%;
        min-height: 40px;
      }

      #exportProgressWrap {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      #exportProgressBar {
        width: 100%;
      }

      #avatarEditor {
        padding: 8px;
        border: 1px solid #d7d7d7;
        border-radius: 10px;
        background: #ffffff;
      }

      #avatarList {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <section id="statusPanel">
        <section id="exportProgressWrap" hidden>
          <p id="exportProgressLabel">0%</p>
          <progress id="exportProgressBar" max="100" value="0"></progress>
        </section>
        <p id="exportMeta" hidden></p>
        <p id="status">초기화 중...</p>
      </section>
      <button id="downloadTest2" type="button">다운로드전 이미지 링크 확인</button>
      <!-- Android Firefox에서는 작은 JSON만 텍스트 공유로 ReadingLog 앱에 전달한다. -->
      <button id="shareReadingLogJson" type="button">ReadingLog 앱으로 데이터 보내기</button>
      <p id="shareHint">작은 JSON은 공유 목록에서 ReadingLog 앱으로 바로 보낼 수 있습니다.</p>
      <section id="avatarEditor" hidden>
        <p><strong>이미지 링크 교체</strong></p>
        <p>해당 이름의 이미지 링크를 수정하면 이미지가 모두 변경됩니다.</p>
        <div id="avatarList"></div>
      </section>
    </main>
    <script src="js/popup/avatar_download_plan.js"></script>
    <script src="js/popup/avatar_preview.js"></script>
    <script src="js/popup/popup.js"></script>
  </body>
</html>
