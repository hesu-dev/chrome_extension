<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>리딩로그 가져오기</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: #f5f0e6;
        color: #1f1c17;
      }

      main {
        width: 320px;
        padding: 16px;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.4;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 12px 14px;
        background: #225a83;
        color: #fffdf8;
        font-size: 14px;
        font-weight: 600;
      }

      section {
        margin-top: 14px;
        padding: 12px;
        border-radius: 12px;
        background: #fffaf2;
      }

      dl {
        margin: 0;
        display: grid;
        grid-template-columns: 88px 1fr;
        gap: 8px;
        font-size: 13px;
      }

      dt {
        color: #756e61;
      }

      dd {
        margin: 0;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <p>현재 열려 있는 Roll20 채팅 로그를 리딩로그 파일로 복사합니다. 복사가 끝나면 앱으로 돌아가주세요.</p>
      <button id="exportButton" type="button">리딩로그로 복사하기</button>
      <section aria-live="polite">
        <dl>
          <dt>단계</dt>
          <dd id="statusStage">준비됨</dd>
          <dt>상태</dt>
          <dd id="statusMessage">Roll20 채팅 로그를 가져올 준비가 되었습니다.</dd>
          <dt>파일명</dt>
          <dd id="statusFilename">대기 중</dd>
          <dt>메시지 수</dt>
          <dd id="statusMetrics">아직 측정된 채팅 로그가 없습니다.</dd>
          <dt>파일 크기</dt>
          <dd id="statusPayload">현재 파일 크기를 아직 계산하지 않았습니다.</dd>
          <!-- <dt>보관함</dt>
          <dd id="statusInbox">아직 앱 보관함으로 복사하지 않았습니다.</dd> -->
        </dl>
      </section>
    </main>
    <script src="js/export_progress_model.js"></script>
    <script src="js/native_bridge_contract.js"></script>
    <script src="js/popup.js"></script>
  </body>
</html>
